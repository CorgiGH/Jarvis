self_explanation_prompt: >-
  Explică, folosind argumentul din curs, de ce ai nevoie de o definiție formală a algoritmului
  pentru a putea demonstra că NU există un algoritm care să rezolve o anumită problemă.
far_transfer_stem: >-
  Cursul afirmă că diferitele modele de calcul introduse pentru definiția formală a algoritmului sunt
  echivalente din punct de vedere computațional. Pornind de la această afirmație, argumentează de ce
  alegerea unui anumit model de calcul nu schimbă mulțimea problemelor care pot fi rezolvate algoritmic.
