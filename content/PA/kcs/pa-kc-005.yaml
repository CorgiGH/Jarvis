# Precise, machine-checkable invariant (SymPyLeg-checkable: a single `lhs = rhs`).
# Grounded in the lecture's array-size rule |a|_d = |a0|_d + ... + |a_{n-1}|_d together
# with the uniform scalar rule |n|_unif = 1: the uniform size of a 3-element array whose
# elements each have uniform size 1 is 1 + 1 + 1 = 3.
invariant: "1 + 1 + 1 = 3"
grader_rules:
  - "sympy: simplify((1 + 1 + 1) - 3) == 0  # uniform array size = sum of element sizes (each |n|_unif = 1)"
