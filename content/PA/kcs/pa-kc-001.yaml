    quote: "It does not exists a standard definition for the notion of algorithm."
  - doc: pa-lecture-01
    quote: "An algorithm is a well-ordered collection of unambiguous and effectively computable\noperations that when executed produces a result and halts in a finite amount of time."
  - doc: pa-lecture-01
    quote: "An algorithm is an ordered sequence of instructions that is guaranteed to solve a\nspecific problem."
