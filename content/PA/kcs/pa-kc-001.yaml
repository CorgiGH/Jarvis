phase_plan:
  - intro
  - practice
  - retrieval
worked_example_first: true
self_explanation_prompt: >-
  De ce trebuie ca operațiile unui algoritm să fie neambigue și efectiv calculabile, iar execuția
  să se termine într-un timp finit? Explică cu propriile cuvinte ce s-ar strica dacă una dintre
  aceste condiții din definiția din curs ar lipsi.
far_transfer_stem: >-
  Ai o rețetă de bucătărie scrisă pas cu pas. Verifică, folosind definiția algoritmului din curs
  (operații neambigue, efectiv calculabile, care produc un rezultat și se opresc în timp finit),
  care condiții sunt îndeplinite și care nu, și argumentează dacă rețeta este sau nu un algoritm.
