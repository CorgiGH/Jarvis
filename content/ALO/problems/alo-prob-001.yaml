id: alo-prob-001
subject: ALO
archetype: Gaussian elimination step trace
# Surface archetype-class: trace
# Covers: §0.9-K trace sub-schema — ≥3 trace steps with expected numeric/string values

statement_ro: |
  Se dă sistemul de ecuații liniare:
    x1 - x2 + 3x3 = 2
   3x1 - 3x2 + x3 = -1
    x1 + x2        = 3

  Rezolvați sistemul prin eliminare Gauss (cu pivotare parțială unde e necesar),
  urmărind pașii de transformare a matricei extinse.
  La fiecare pas, dați valoarea elementului pivot și rezultatul după eliminare.

solution_present: true

# trace_steps per §0.9-K: ≥3 steps, expected values (numeric or exact string), tolerance
solution:
  trace_steps:
    - index: 0
      label_ro: "Pasul 1 — multiplicatorul f21 (eliminare x1 din E2)"
      expected: "-3"
      tolerance: null
    - index: 1
      label_ro: "Pasul 2 — multiplicatorul f31 (eliminare x1 din E3)"
      expected: "-1"
      tolerance: null
    - index: 2
      label_ro: "Pasul 3 — valoarea x3 după substituție inversă"
      expected: "0.875"
      tolerance: 1.0e-9
    - index: 3
      label_ro: "Pasul 4 — valoarea x2 după substituție inversă"
      expected: "1.8125"
      tolerance: 1.0e-9
    - index: 4
      label_ro: "Pasul 5 — valoarea x1 după substituție inversă"
      expected: "1.1875"
      tolerance: 1.0e-9

  reference_solution: |
    Matricea extinsa initiala:
    ( 1  -1   3 | 2)
    ( 3  -3   1 |-1)
    ( 1   1   0 | 3)

    Pas 1: f21 = -3/1 = -3; E2 = E2 + (-3)*E1 => (0  0  -8 | -7)
    Pas 1: f31 = -1/1 = -1; E3 = E3 + (-1)*E1 => (0  2  -3 |  1)

    Dupa pas 1:
    ( 1  -1   3 | 2)
    ( 0   0  -8 |-7)
    ( 0   2  -3 | 1)

    Pivotul a22=0 => pivotare: interschimbam E2 cu E3:
    ( 1  -1   3 | 2)
    ( 0   2  -3 | 1)
    ( 0   0  -8 |-7)

    Substitutie inversa:
    x3 = -7 / -8 = 7/8 = 0.875
    x2 = (1 - (-3)*0.875) / 2 = (1 + 2.625) / 2 = 3.625 / 2 = 1.8125
    x1 = (2 - (-1)*1.8125 - 3*0.875) / 1 = (2 + 1.8125 - 2.625) = 1.1875

