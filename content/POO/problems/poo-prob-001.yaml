id: poo-prob-001
subject: POO
archetype: Constructor/destructor order trace in C++
# Surface archetype-class: code
# Covers: §0.9-K code sub-schema — reference_source (C++ program) + expected_stdout

statement_ro: |
  Se dă programul C++ următor cu clasa Sensor care afișează constructorul:
  ```cpp
  #include <cstdio>
  #include <iostream>

  class Sensor {
  public:
      Sensor(const char* name) {
          printf("CTOR  -> %s\n", name);
      }
  };

  Sensor globalSensor("global");

  int main() {
      printf("--- entering main ---\n");
      Sensor local("local");
      Sensor* heap = new Sensor("heap");
      Sensor arr[2] = { "arr[0]", "arr[1]" };
      Sensor* ptr;
      std::cout << sizeof(Sensor);
      delete heap;
      return 0;
  }
  ```
  Ce se afișează la rularea programului? Scrieți programul și compilați-l cu g++ pentru a verifica.

solution_present: true

# code sub-schema per §0.9-K
solution:
  reference_source: |
    #include <cstdio>
    #include <iostream>

    class Sensor {
    public:
        Sensor(const char* name) {
            printf("CTOR  -> %s\n", name);
        }
    };

    Sensor globalSensor("global");

    int main() {
        printf("--- entering main ---\n");
        Sensor local("local");
        Sensor* heap = new Sensor("heap");
        Sensor arr[2] = { "arr[0]", "arr[1]" };
        Sensor* ptr;
        std::cout << sizeof(Sensor);
        delete heap;
        return 0;
    }

  expected_stdout: |
    CTOR  -> global
    --- entering main ---
    CTOR  -> local
    CTOR  -> heap
    CTOR  -> arr[0]
    CTOR  -> arr[1]
    1

