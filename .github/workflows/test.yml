name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref so a fast-follow push doesn't queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (gradle :test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - name: Gradle :test (root project only — android subproject skipped)
        run: gradle --no-daemon :test --stacktrace
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/test/

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tutor-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tutor-web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: vitest run
        run: npm test

  daemon:
    name: daemon (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Install libxdo + dbus dev headers (enigo + keyring deps)
        run: sudo apt-get update && sudo apt-get install -y libxdo-dev libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: cargo test
        run: cargo test --locked
