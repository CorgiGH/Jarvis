name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref so a fast-follow push doesn't queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (gradle check)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      # Plan-6 Task 13: R toolchain for INV-6.2 + Alk fetch (pinned, git-ignored)
      - name: Install R and fetch Alk (Plan-6 INV-6.2 toolchain)
        run: |
          sudo apt-get update && sudo apt-get install -y r-base-core
          node tools/fetch-alk.mjs
      - name: Gradle check (root project only; includes validateContent + INV-3.5 SignatureLockPinTest)
        run: gradle --no-daemon :check --stacktrace --info
      - name: Print failing test XML on failure
        if: failure()
        run: |
          echo "=== Failing test details ==="
          for f in build/test-results/test/*.xml; do
            if grep -qE 'failures="[1-9]|errors="[1-9]' "$f"; then
              echo "--- $f ---"
              cat "$f"
              # First <failure ...> line as a one-line annotation.
              first_msg=$(grep -m1 '<failure' "$f" | sed 's/.*message="\([^"]*\)".*/\1/' | head -c 400)
              echo "::error file=${f}::${first_msg}"
            fi
          done
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/test/

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tutor-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tutor-web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: vitest run
        run: npm test
      # Plan 4b Task 7 / §0.9G (INV-8.3) — chrome EN-literal grep, BLOCKING. Calibrated by
      # construction (Task 7 swept all 8 scoped components to chromeStrings.ts before this patch was
      # delivered, so green is achieved at landing). Runs from the repo root (the tool resolves the
      # scope file + component paths relative to repo root; the frontend job otherwise cwd's tutor-web).
      - name: Chrome EN-literal grep (INV-8.3)
        working-directory: .
        run: node tools/chrome-en-grep.mjs
      # Plan 4a §0.9C — Impeccable design-quality gate, FAIL-OPEN (council-1781132987 amendment).
      # Pinned impeccable@2.3.2; applicable-subset applied as a POST-PROCESS FILTER (no --config
      # flag exists). The `|| true` keeps it non-blocking until calibrate+subset are landed AND
      # reviewed; flip to blocking in a follow-up once validated against a few green PRs.
      - name: Impeccable detect (fail-open)
        run: npx --yes impeccable@2.3.2 detect --json src/ | node ../tools/impeccable-filter.mjs || true
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Playwright e2e
        run: npm run e2e

  daemon:
    name: daemon (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4
      - name: Install libxdo + dbus dev headers (enigo + keyring deps)
        run: sudo apt-get update && sudo apt-get install -y libxdo-dev libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon
      - name: cargo test
        run: cargo test --locked

  practice-e2e:
    name: practice e2e (real Kotlin backend + seeded corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tutor-web
    env:
      # ENV-GATE: set here (and ONLY here) so the five practice specs boot the backend.
      # The existing frontend job's Playwright run NEVER sets this � practice specs self-skip there.
      JARVIS_PRACTICE_E2E: "1"
      JARVIS_AUTH_TOKEN: practice-e2e-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tutor-web/package-lock.json
      - name: Install R
        run: sudo apt-get update && sudo apt-get install -y r-base-core
      - name: Fetch Alk interpreter
        run: node ../tools/fetch-alk.mjs
      - name: npm ci
        run: npm ci
      - name: npm run build (frontend for Ktor serve during e2e)
        run: npm run build
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Pre-compile backend (so per-spec gradle :run boots without compiling under contention)
        working-directory: .
        run: ./gradlew --no-daemon :classes
      # --workers=1: each practice spec boots its OWN Kotlin backend; running them in parallel
      # starves JVM boot on the 2-core runner (4/7 timed out at 90s). Serial boot + the raised
      # 180s health timeout in practiceServer.ts keeps it green. Job timeout is 30 min.
      - name: Practice e2e (5 surfaces + phase5-core-loop)
        run: npx playwright test e2e/practice e2e/phase5-core-loop.spec.ts --config playwright.config.ts --workers=1
      - name: Upload practice e2e reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: practice-e2e-reports
          path: tutor-web/playwright-report/

  backup-tooling:
    name: backup tooling (db-backup.py unittest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: db-backup floor tests (M-DB fail-closed)
        run: python tools/test_db_backup.py
      - name: db-backup hardening tests (argparse + manifest + restore drill)
        run: python tools/test_db_backup_hardening.py

  verifier-deps-loud-red:
    name: verifier deps loud-red (INV-9.3 seeded drill)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - name: ALL verifier deps hidden -> verifyContent aborts RED before touching any DB
        env:
          JARVIS_TUTOR_DB: /tmp/loudred-all.db
        run: |
          set +e
          gradle --no-daemon verifyContent > loudred-all.log 2>&1
          code=$?
          set -e
          echo "gradle exit=$code"
          tail -40 loudred-all.log
          test "$code" -ne 0
          grep -q "verifyContent ABORTED (FAIL-LOUD, H4)" loudred-all.log
          grep -q "JARVIS_RELAY_URL" loudred-all.log
          grep -q "JARVIS_PYTHON3" loudred-all.log
          test ! -e /tmp/loudred-all.db
      - name: ONE hidden dep (JARVIS_PYTHON3) -> still RED, named in the abort
        env:
          JARVIS_TUTOR_DB: /tmp/loudred-one.db
          JARVIS_RELAY_URL: http://127.0.0.1:1
          JARVIS_RELAY_TOKEN: seeded-drill-dummy
        run: |
          set +e
          gradle --no-daemon verifyContent > loudred-one.log 2>&1
          code=$?
          set -e
          echo "gradle exit=$code"
          tail -40 loudred-one.log
          test "$code" -ne 0
          grep -q "JARVIS_PYTHON3" loudred-one.log
          test ! -e /tmp/loudred-one.db

  lesson-gates:
    # Plan 4b Task 9 / §0.9J (R-4b-Q2 option (a)) — rendered gates 4a–4d on the REAL lesson route over
    # the REAL corpus, served by a boot-up Ktor server against a seeded SQLite DB (real admission path,
    # deterministic faithful stamp, zero LLM). The seed manifest's kcIds/figureKcIds are DERIVED from
    # the corpus, so coverage grows with zero edits when Plan 5/6 admits a new beat-complete KC or
    # figure binding. The default frontend job's `npm run e2e` honestly SKIPS lesson-gates (no JVM); it
    # runs here with REAL_BACKEND=1 against the live backend (vite proxies /api → :8080, no config edit).
    name: lesson-gates (real backend, seeded corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tutor-web/package-lock.json
      - name: npm ci (tutor-web)
        working-directory: tutor-web
        run: npm ci
      - name: Install Playwright browsers (chromium only)
        working-directory: tutor-web
        run: npx playwright install --with-deps chromium
      - name: Seed the e2e DB from the real corpus (real admission path, zero LLM)
        run: gradle --no-daemon :seedE2eDb --stacktrace
      - name: Boot the real Ktor server against the seeded DB (background)
        env:
          # The web server requires a bearer token to boot (WebMain.kt). A throwaway random value is
          # fine — the lesson-gates spec authenticates via the seeded jarvis_session cookie, not the
          # bearer; the token only unlocks server startup.
          JARVIS_AUTH_TOKEN: ci-lesson-gates-throwaway-token-0123456789abcdef
          JARVIS_TUTOR_DB: ${{ github.workspace }}/build/e2e/tutor.db
          JARVIS_CONTENT_DIR: ${{ github.workspace }}/content
          JARVIS_PORT: "8080"
        run: |
          nohup gradle --no-daemon run --args=web > build/e2e/server.log 2>&1 &
          echo "server-pid=$!"
      - name: Wait for server readiness (60×2s; any HTTP status = up)
        run: |
          up=""
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/tutor/auto-session || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "server up after ${i} tries — HTTP ${code}"
              up=1
              break
            fi
            sleep 2
          done
          if [ -z "$up" ]; then
            echo "::error::server never became ready"
            cat build/e2e/server.log || true
            exit 1
          fi
      - name: Run lesson-gates against the real backend
        working-directory: tutor-web
        env:
          REAL_BACKEND: "1"
        run: npx playwright test e2e/lesson-gates.spec.ts
      - name: Upload server log + playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lesson-gates-artifacts
          path: |
            build/e2e/server.log
            tutor-web/playwright-report/

  frame-gate:
    # Multi-frame figure = conjunction gate (SESSION-75/76). The frame-conjunction gate rasterizes the
    # step-through figures at 1536×730 real DPR over the REAL renderer and HARD-FAILS when a frame's
    # STATE moved but the figure pixels stayed frozen (the merge figure shipped dead 4 frames before
    # this gate existed). These merge routes are pure-frontend demo routes — the gate needs only a VITE
    # dev server on :5173, NOT the Ktor backend. HARD-BLOCKING: no continue-on-error, no `|| true`.
    name: frame-gate (frame-conjunction figure gate, real renderer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tutor-web/package-lock.json
      - name: npm ci (tutor-web)
        working-directory: tutor-web
        run: npm ci
      - name: Install Playwright browsers (chromium only)
        working-directory: tutor-web
        run: npx playwright install --with-deps chromium
      - name: Ensure build/ dir exists (for vite + gate logs)
        run: mkdir -p build
      - name: Boot the vite dev server (background, port 5173 pinned in vite.config.ts)
        working-directory: tutor-web
        run: nohup npm run dev > ../build/frame-gate-vite.log 2>&1 &
      - name: Wait for vite readiness (60×2s; any HTTP status = up)
        run: |
          up=""
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173/tutor/merge-compare || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "vite up after ${i} tries — HTTP ${code}"
              up=1
              break
            fi
            sleep 2
          done
          if [ -z "$up" ]; then
            echo "::error::vite never became ready"
            cat build/frame-gate-vite.log || true
            exit 1
          fi
      - name: Run the frame-conjunction figure gate (HARD-BLOCKING)
        shell: bash
        run: node tutor-web/tools/frame-conjunction-gate.mjs 2>&1 | tee build/frame-gate.log
      - name: Upload gate + vite logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frame-gate-artifacts
          path: |
            build/frame-gate.log
            build/frame-gate-vite.log

  gate-registry:
    # Phase-0 deliverable (2026-06-15): the gate-coverage registry is the named board mapping every
    # spec INV-*/clause to a status (LIVE-GREEN / PLANNED / RED-UNMAPPED) + LAYER + PROOF/ESTIMATOR tag.
    # This check REDS if any clause is UNMAPPED, a PROOF clause is backed only by an estimator, a
    # RED-UNMAPPED id is not in the printed accepted-debt allow-list, duplicate ids, or counts drift.
    # The self-test feeds the checker known-bad fixtures and asserts it reds (INV-9.4 liveness, this gate).
    name: gate-registry (coverage + self-test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Gate-coverage registry consistency (zero UNMAPPED, no estimator laundered green)
        run: node tools/gate-registry-check.mjs
      - name: Registry checker self-test (seeded-bad reds)
        run: node --test tools/gate-registry-check.test.mjs
